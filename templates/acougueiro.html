<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Açougueiro</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #d32f2f; color: white; }
        .aviso { background: #fff3e0; border-left: 5px solid #ff9800; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🥩 Alertas do seu Açougue Inteligente</h1>
        <div style="margin: 20px 0;">
    <button onclick="pedirSugestao()" style="background: #ffc107; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        ✨ Pedir Sugestão da IA
    </button>
</div>

<div id="campo-ia" style="background: #fff3cd; padding: 15px; border-radius: 8px; display: none;">
    <p id="texto-ia"></p>
</div>

<script>
async function pedirSugestao() {
    const response = await fetch('/gerar_insights');
    const data = await response.json();
    
    const campo = document.getElementById('campo-ia');
    const texto = document.getElementById('texto-ia');
    
    campo.style.display = 'block';
    texto.innerHTML = data.avisos.join('<br> ');
}
</script>
        <div style="background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;">
    <h3>➕ Adicionar Novo Item</h3>
    <form action="/adicionar_estoque" method="post" style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" name="nome" placeholder="Nome da Carne" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <input type="number" name="quantidade" step="0.01" placeholder="Quantidade (Kg)" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <input type="number" name="preco" step="0.01" placeholder="Preço/Kg" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <button type="submit" style="background: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Cadastrar Carne</button>
    </form>
</div>
        
        <h3>💡 Sugestões da IA:</h3>
        {% for aviso in avisos %}
            <div class="aviso">{{ aviso }}</div>
        {% endfor %}

        <h3>📦 Estoque Atual:</h3>
        <table>
            <thead>
                <tr>
                    <th>Corte</th>
                    <th>Quantidade (Kg)</th>
                    <th>Preço/Kg</th>
                </tr>
            </thead>
            <tbody>
                {% for item in estoque %}
                <tr>
                    <td>{{ item.nome }}</td>
                    <td>{{ item.quantidade }}</td>
                    <td>R$ {{ item.preco_quilo }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
